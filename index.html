<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invite Generator</title>
    <style>
        :root { --gold: #8d754a; --text: #4a4238; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8f5f0; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; color: var(--text); }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 100%; max-width: 400px; box-sizing: border-box; }
        h2 { text-align: center; color: var(--gold); margin-top: 0; font-size: 1.2rem; }
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .radio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .radio-btn { border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; font-size: 13px; cursor: pointer; position: relative; }
        .radio-btn input { position: absolute; opacity: 0; }
        .radio-btn.selected { background: var(--gold); color: white; border-color: var(--gold); }
        .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .btn-gen { background: var(--gold); color: white; }
        .btn-whatsapp { background: #25D366; color: white; display: none; }
        #previewCanvas { width: 100%; border-radius: 8px; margin-top: 15px; border: 1px solid #eee; display: none; }
        .step-hint { font-size: 11px; color: #888; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Personalize Invitation</h2>
    
    <label>This invite is for:</label>
    <div class="radio-grid" id="radioGroup">
        <label class="radio-btn"><input type="radio" name="sal" value="Mr."> Mr.</label>
        <label class="radio-btn"><input type="radio" name="Ms."><input type="radio" name="sal" value="Ms."> Ms.</label>
        <label class="radio-btn"><input type="radio" name="sal" value="Mr. and Mrs."> Mr. & Mrs.</label>
        <label class="radio-btn"><input type="radio" name="sal" value="Family"> Family</label>
    </div>

    <div class="input-group">
        <label>Guest Name:</label>
        <input type="text" id="gName" placeholder="Enter name">
    </div>

    <div class="input-group">
        <label>WhatsApp Number:</label>
        <input type="tel" id="pNum" placeholder="947XXXXXXXX">
    </div>

    <div class="actions">
        <button class="btn-gen" onclick="processImage()">1. Generate & Save Image</button>
        <p class="step-hint">Long-press the image below to save it to your Photos.</p>
        <button id="waBtn" class="btn-whatsapp" onclick="openWhatsApp()">2. Open WhatsApp Chat</button>
    </div>

    <canvas id="previewCanvas"></canvas>
</div>

<script>
    // Visual Radio Selection
    document.querySelectorAll('.radio-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            btn.querySelector('input').checked = true;
        });
    });

    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.src = 'final invite akka d.jpg';

    function processImage() {
        const name = document.getElementById('gName').value;
        const salutation = document.querySelector('input[name="sal"]:checked')?.value;

        if(!name || !salutation) { alert("Please select Mr/Ms and enter a name."); return; }

        // Set high-quality canvas size based on image
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        ctx.drawImage(img, 0, 0);

        // --- COORDINATES ADJUSTMENT ---
        // 1. Strike-throughs (Line Y-axis changed to ~448)
        const coords = [
            { val: "Mr.", x: 265, w: 65 },
            { val: "Ms.", x: 355, w: 65 },
            { val: "Mr. and Mrs.", x: 505, w: 195 },
            { val: "Family", x: 690, w: 110 }
        ];

        ctx.strokeStyle = "#4a4238";
        ctx.lineWidth = 3;
        coords.forEach(c => {
            if(c.val !== salutation) {
                ctx.beginPath();
                ctx.moveTo(c.x - (c.w/2), 448); 
                ctx.lineTo(c.x + (c.w/2), 448);
                ctx.stroke();
            }
        });

        // 2. Guest Name (Y-axis adjusted to ~505 to sit on the line)
        ctx.font = "italic 42px 'Times New Roman', serif";
        ctx.fillStyle = "#4a4238";
        ctx.textAlign = "center";
        ctx.fillText(name, canvas.width / 2, 505);

        // Show results
        canvas.style.display = "block";
        document.getElementById('waBtn').style.display = "block";
        
        // Auto-download for some mobile browsers
        const link = document.createElement('a');
        link.download = `Invite-${name}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.9);
        // link.click(); // Optional: triggered automatically on some devices
    }

    function openWhatsApp() {
        const phone = document.getElementById('pNum').value;
        if(!phone) { alert("Enter WhatsApp number"); return; }
        
        const text = encodeURIComponent("Hi! Sending you the invitation for our wedding. Please see the image below!");
        window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
    }
</script>
</body>
</html>
